<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">
<rect width="820" height="460" fill="#fdfdfb"/>
<text x="410.0" y="30" text-anchor="middle" font-size="18" font-weight="600" fill="#222">Per-call cost: inlined vs real call</text>
<text x="410.0" y="50" text-anchor="middle" font-size="12" fill="#666">ns/op, mean of 5 runs at -benchtime=2s. Lower is better.</text>
<line x1="70" y1="350.0" x2="790" y2="350.0" stroke="#bbb" stroke-width="1"/>
<text x="62" y="354.0" text-anchor="end" fill="#666">0.0</text>
<line x1="70" y1="306.2" x2="790" y2="306.2" stroke="#e0e0e0" stroke-width="1"/>
<text x="62" y="310.2" text-anchor="end" fill="#666">0.5</text>
<line x1="70" y1="262.5" x2="790" y2="262.5" stroke="#bbb" stroke-width="1"/>
<text x="62" y="266.5" text-anchor="end" fill="#666">1.0</text>
<line x1="70" y1="218.8" x2="790" y2="218.8" stroke="#e0e0e0" stroke-width="1"/>
<text x="62" y="222.8" text-anchor="end" fill="#666">1.5</text>
<line x1="70" y1="175.0" x2="790" y2="175.0" stroke="#bbb" stroke-width="1"/>
<text x="62" y="179.0" text-anchor="end" fill="#666">2.0</text>
<line x1="70" y1="131.2" x2="790" y2="131.2" stroke="#e0e0e0" stroke-width="1"/>
<text x="62" y="135.2" text-anchor="end" fill="#666">2.5</text>
<line x1="70" y1="87.5" x2="790" y2="87.5" stroke="#bbb" stroke-width="1"/>
<text x="62" y="91.5" text-anchor="end" fill="#666">3.0</text>
<text x="20" y="210.0" text-anchor="middle" transform="rotate(-90, 20, 210.0)" fill="#444" font-size="13">ns / op</text>
<rect x="70.0" y="98.0" width="153.0" height="252.0" fill="#b94a48" rx="2"/>
<text x="146.5" y="92.0" text-anchor="middle" fill="#222" font-size="12" font-weight="600">2.88</text>
<text x="146.5" y="368.0" text-anchor="middle" fill="#222" font-size="12">addDefer</text>
<text x="146.5" y="384.0" text-anchor="middle" fill="#b94a48" font-size="11" font-style="italic">not inlined</text>
<rect x="237.0" y="270.4" width="153.0" height="79.6" fill="#1f9d55" rx="2"/>
<text x="313.5" y="264.4" text-anchor="middle" fill="#222" font-size="12" font-weight="600">0.91</text>
<text x="313.5" y="368.0" text-anchor="middle" fill="#222" font-size="12">addPlain</text>
<text x="313.5" y="384.0" text-anchor="middle" fill="#1f9d55" font-size="11" font-style="italic">inlined</text>
<text x="230.0" y="410.0" text-anchor="middle" fill="#333" font-size="12" font-weight="600">The helper refactor</text>
<text x="230.0" y="426.0" text-anchor="middle" fill="#1f9d55" font-size="12" font-weight="700">3.16x faster when inlined</text>
<rect x="470.0" y="275.5" width="153.0" height="74.5" fill="#b94a48" rx="2"/>
<text x="546.5" y="269.5" text-anchor="middle" fill="#222" font-size="12" font-weight="600">0.85</text>
<text x="546.5" y="368.0" text-anchor="middle" fill="#222" font-size="12">addNI (noinline)</text>
<text x="546.5" y="384.0" text-anchor="middle" fill="#b94a48" font-size="11" font-style="italic">not inlined</text>
<rect x="637.0" y="331.2" width="153.0" height="18.8" fill="#1f9d55" rx="2"/>
<text x="713.5" y="325.2" text-anchor="middle" fill="#222" font-size="12" font-weight="600">0.21</text>
<text x="713.5" y="368.0" text-anchor="middle" fill="#222" font-size="12">addOK (inlined)</text>
<text x="713.5" y="384.0" text-anchor="middle" fill="#1f9d55" font-size="11" font-style="italic">inlined</text>
<text x="630.0" y="410.0" text-anchor="middle" fill="#333" font-size="12" font-weight="600">//go:noinline vs inlined</text>
<text x="630.0" y="426.0" text-anchor="middle" fill="#1f9d55" font-size="12" font-weight="700">3.96x faster when inlined</text>
<rect x="610" y="64" width="14" height="14" fill="#b94a48" rx="2"/>
<text x="632" y="75" fill="#333">not inlined (real call)</text>
<rect x="610" y="86" width="14" height="14" fill="#1f9d55" rx="2"/>
<text x="632" y="97" fill="#333">inlined by the compiler</text>
<text x="790" y="448" text-anchor="end" fill="#777" font-size="11">Go 1.15 | linux/amd64 | go test -bench=. -count=5 -benchtime=2s</text>
</svg>